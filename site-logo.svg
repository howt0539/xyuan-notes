  <text x="42" y="38" font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', 'Hiragino Sans', sans-serif" font-size="18" font-weight="500" fill="#3a3330" letter-spacing="1">自由潛水學習筆記</text>
</svg>
