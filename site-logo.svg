    <circle cx="8" cy="3" r="2.8"/>
    <!-- Body - streamlined torso -->
    <path d="M5.8,5.5 Q5.5,7 5.8,9.5 L6,14 Q6.2,16.5 6.6,18 L9.4,18 Q9.8,16.5 10,14 L10.2,9.5 Q10.5,7 10.2,5.5 Z"/>
