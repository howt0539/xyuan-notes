<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自由潛水學習筆記</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="description" content="自由潛水學習筆記與教材｜製作：@howt0539">
  <meta property="og:title" content="自由潛水學習筆記">
  <meta property="og:description" content="直播筆記 · 教學教材 · 練習手冊｜製作：@howt0539">
  <meta property="og:image" content="https://howt0539.github.io/howt-freedive/og-image.png">
  <meta property="og:url" content="https://howt0539.github.io/howt-freedive/">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="自由潛水學習筆記">
  <meta name="twitter:description" content="直播筆記 · 教學教材 · 練習手冊｜製作：@howt0539">
  <meta name="twitter:image" content="https://howt0539.github.io/howt-freedive/og-image.png">
  <link href="fonts/noto-sans-tc-local.css" rel="stylesheet">
  <link rel="preload" href="fonts/72de95a419e8.woff2" as="font" type="font/woff2" crossorigin>
  <style>
    :root {
      --bg: #D5CEC6;
      --surface: #C8C0B7;
      --card: #E2DBD3;
      --card-hover: #DDD5CC;
      --border: #BFB7AD;
      --text: #3E3835;
      --text-secondary: #7A7370;
      --accent: #A6796A;
      --accent-soft: rgba(166,121,106,0.12);
      --accent-glow: rgba(166,121,106,0.2);
      --warm: #A6796A;
      --warm-soft: rgba(166,121,106,0.12);
      --radius: 20px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans TC', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }

    .icon { font-size: 4rem; margin-bottom: 20px; }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    h1 .accent { color: var(--accent); }

    .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 12px;
    }

    .meta {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .badge a {
      color: var(--accent);
      text-decoration: none;
    }

    .cards {
      display: grid;
      gap: 16px;
      margin-bottom: 40px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 32px 28px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      transition: all 0.25s;
      text-align: left;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(62,56,53,0.08);
    }
    .card-notes:hover {
      border-color: rgba(166,121,106,0.4);
      background: var(--card-hover);
    }
    .card-slides:hover {
      border-color: rgba(166,121,106,0.4);
      background: var(--card-hover);
    }

    .card-icon {
      font-size: 2.4rem;
      flex-shrink: 0;
    }

    .card-info { flex: 1; }
    .card-info h2 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .card-notes .card-info h2 { color: var(--accent); }
    .card-slides .card-info h2 { color: #A6796A; }
    .card-info p {
      font-size: 0.88rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .card-arrow {
      font-size: 1.4rem;
      color: var(--text-secondary);
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .card:hover .card-arrow {
      transform: translateX(4px);
    }
    .card-notes:hover .card-arrow { color: var(--accent); }
    .card-slides:hover .card-arrow { color: #A6796A; }

    .card-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      margin-bottom: 8px;
    }
    .card-notes .card-tag {
      background: var(--accent-soft);
      color: var(--accent);
    }
    .card-slides .card-tag {
      background: rgba(166,121,106,0.12);
      color: #A6796A;
    }

    footer {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      body { padding: 30px 16px; }
      .card { padding: 24px 20px; gap: 14px; }
      .card-icon { font-size: 1.8rem; }
      .card-info h2 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="favicon.svg" alt="logo" style="width: 64px; height: 64px; margin-bottom: 20px;">
    <h1>自由潛水學習筆記</h1>
    <div class="meta">
      <span class="badge">✏️ 製作：<a href="https://www.instagram.com/howt0539" target="_blank">@howt0539</a></span>
    </div>

    <div class="cards">
      <a class="card card-notes" href="notes.html">
        <span class="card-icon">🎙️</span>
        <div class="card-info">
          <span class="card-tag">9 場直播</span>
          <h2>直播筆記</h2>
          <p>來源：志璿教練 IG 直播｜按日期或主題瀏覽摘要，支援全文搜尋</p>
        </div>
        <span class="card-arrow">→</span>
      </a>
      <a class="card card-slides" href="slides/">
        <span class="card-icon">📖</span>
        <div class="card-info">
          <span class="card-tag">9 堂課</span>
          <h2>教學教材</h2>
          <p>從呼吸基礎到深度進階，按課程脈絡整理的卡片式教材</p>
        </div>
        <span class="card-arrow">→</span>
      </a>
    </div>

    <footer>
      <p>自由潛水學習筆記 © 2026</p>
    </footer>
  </div>

</body>
</html>
