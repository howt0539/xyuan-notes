<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Freediver silhouette - head-down streamlined position -->
  <g fill="#B05A3A">
    <!-- Head -->
    <circle cx="16" cy="4" r="2.5"/>
    <!-- Neck and torso - solid filled shape -->
    <path d="M14.2,6.2 C14,7.5 13.8,10 14,13 L14.2,18 L17.8,18 L18,13 C18.2,10 18,7.5 17.8,6.2 Z"/>
    <!-- Left arm swept back -->
    <path d="M14.2,8 Q12.8,9 11.8,10.5 Q11.2,11.5 11.5,12 Q12.2,11 13.2,10 Q14,9.2 14.5,9 Z"/>
    <!-- Right arm swept back -->
    <path d="M17.8,8 Q19.2,9 20.2,10.5 Q20.8,11.5 20.5,12 Q19.8,11 18.8,10 Q18,9.2 17.5,9 Z"/>
    <!-- Legs together -->
    <path d="M14.5,17.5 L14.3,24 L17.7,24 L17.5,17.5 Z"/>
    <!-- Left fin blade -->
    <path d="M14.3,23.5 Q13,25.5 11.5,27.5 Q10.5,29 10.8,30 Q11.8,29 13.5,27 Q14.5,25.5 15,24.5 Z"/>
    <!-- Right fin blade -->
    <path d="M17.7,23.5 Q19,25.5 20.5,27.5 Q21.5,29 21.2,30 Q20.2,29 18.5,27 Q17.5,25.5 17,24.5 Z"/>
  </g>
  <!-- Bubbles -->
  <circle cx="21" cy="6" r="1.2" fill="#B05A3A" opacity="0.25"/>
  <circle cx="22.5" cy="9.5" r="0.8" fill="#B05A3A" opacity="0.2"/>
  <circle cx="20" cy="3" r="0.6" fill="#B05A3A" opacity="0.3"/>
</svg>
